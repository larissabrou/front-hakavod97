          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Region'

  /communes:
    get:
      tags: [Public - Géographie]
      summary: Liste des communes
      parameters:
        - name: region
          in: query
          description: Filtrer par ID région
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Commune'

  /store/settings:
    get:
      tags: [Store - Boutique]
      summary: Paramètres boutique (devises, langues, médias)
      description: |
        **À appeler au démarrage de l'app** (pattern standard e-commerce).
        Retourne devises, taux de change, langues et limites médias (`media_limits`).
        Le front stocke la devise choisie et convertit les prix XOF localement.
      parameters:
        - name: lang
          in: query
          schema:
            type: string
            enum: [fr, en]
            default: fr
      responses:
        '200':
          description: Devises XOF/USD/EUR et langues FR/EN

  /store/categories:
    get:
      tags: [Store - Boutique]
      summary: Arbre catégories public
      parameters:
        - $ref: '#/components/parameters/LangQuery'
      responses:
        '200':
          description: Catégories actives

  /store/products:
    get:
      tags: [Store - Boutique]
      summary: Catalogue public (prix en XOF)
      description: |
        Retourne les prix en XOF uniquement. Le front convertit pour l'affichage
        USD/EUR avec les taux de `GET /store/settings`.
      parameters:
        - name: category_id
          in: query
          schema:
            type: integer
        - name: sub_category_id
          in: query
          schema:
            type: integer
        - name: color_id
          in: query
          schema:
            type: integer
        - name: size_id
          in: query
          schema:
            type: integer
        - name: min_price
          in: query
          schema:
            type: number
        - name: max_price
          in: query
          schema:
            type: number
        - name: featured
          in: query
          schema:
            type: boolean
        - name: sort
          in: query
          schema:
            type: string
            enum: [latest, price_asc, price_desc]
      responses:
        '200':
          description: Catalogue paginé

  /store/products/{id}:
    get:
      tags: [Store - Boutique]
      summary: Fiche produit publique (prix en XOF)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Détail produit, prix en XOF

  /store/checkout/preview:
    post:
      tags: [Store - Boutique]
      summary: Récapitulatif checkout (devise choisie)
      description: |
        À appeler sur la page panier/checkout **avant** validation.
        Affiche sous-total, livraison et total dans la devise choisie.
        Les montants XOF restent la référence pour le paiement réel.
      parameters:
        - $ref: '#/components/parameters/LangQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    type: object
                    required: [product_id, product_variant_id, quantity]
                    properties:
                      product_id:
                        type: integer
                      product_variant_id:
                        type: integer
                      quantity:
                        type: integer
                shipping_zone_id:
                  type: integer
                currency:
                  type: string
                  enum: [XOF, USD, EUR]
                  default: XOF
      responses:
        '200':
          description: Récap avec total_display dans la devise demandée

  /store/orders:
    post:
      tags: [Store - Boutique]
      summary: Passer une commande
      description: |
        Enregistre la commande en **XOF**. Passer `currency` pour la réponse
        d'affichage (confirmation) dans la devise choisie par l'utilisateur.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_name, customer_email, customer_phone, shipping_address, commune_id, items]
              properties:
                customer_name:
                  type: string
                customer_email:
                  type: string
                customer_phone:
                  type: string
                shipping_address:
                  type: string
                commune_id:
                  type: integer
                shipping_zone_id:
                  type: integer
                notes:
                  type: string
                currency:
                  type: string
                  enum: [XOF, USD, EUR]
                  description: Devise d'affichage de la confirmation
                lang:
                  type: string
                  enum: [fr, en]
                items:
                  type: array
                  items:
                    type: object
                    required: [product_id, product_variant_id, quantity]
                    properties:
                      product_id:
                        type: integer
                      product_variant_id:
                        type: integer
                        description: Obligatoire — couleur et taille choisies
                      quantity:
                        type: integer
      responses:
        '201':
          description: Commande créée avec total_display

  /store/orders/{reference}:
    get:
      tags: [Store - Boutique]
      summary: Suivi commande par référence
      parameters:
        - $ref: '#/components/parameters/CurrencyQuery'
        - $ref: '#/components/parameters/LangQuery'
        - name: reference
          in: path
          required: true
          schema:
            type: string
            example: CMD-AB12CD34
      responses:
        '200':
          description: Statut commande
