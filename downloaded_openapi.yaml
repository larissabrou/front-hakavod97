        **Programmation** : `"scheduled_at": "2026-06-15T10:00:00+00:00"` (sans send_now)
        **Brouillon** : ni send_now ni scheduled_at
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, audience_type]
              properties:
                name:
                  type: string
                  example: Soldes été 2026
                notification_template_id:
                  type: integer
                subject:
                  type: string
                  description: Surcharge le sujet du template
                body_html:
                  type: string
                  description: Surcharge le corps du template
                audience_type:
                  type: string
                  enum: [all_clients, custom_list]
                custom_emails:
                  type: array
                  items:
                    type: string
                    format: email
                variables:
                  type: object
                  properties:
                    promotion_title:
                      type: string
                    promotion_description:
                      type: string
                    promotion_code:
                      type: string
                    cta_url:
                      type: string
                      format: uri
                scheduled_at:
                  type: string
                  format: date-time
                send_now:
                  type: boolean
                  description: Envoyer immédiatement à la création
      responses:
        '201':
          description: Campagne créée

  /admin/notification-campaigns/{id}:
