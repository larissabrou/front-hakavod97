        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Sous-catégorie créée

  /admin/sub-categories/{id}:
    put:
      tags: [Admin - Catégories]
      summary: Modifier une sous-catégorie
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Sous-catégorie mise à jour
    delete:
      tags: [Admin - Catégories]
      summary: Supprimer une sous-catégorie
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Sous-catégorie supprimée

  /admin/products:
    get:
      tags: [Admin - Produits]
      summary: Liste des produits
      security: [{ bearerAuth: [] }]
      parameters:
        - name: category_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, available, preorder, out_of_stock]
        - name: stock
          in: query
          schema:
            type: string
            enum: [low, out]
        - name: search
          in: query
          schema:
            type: string
        - name: per_page
          in: query
          schema:
            type: integer
            default: 15
      responses:
        '200':
          description: Liste paginée
    post:
      tags: [Admin - Produits]
      summary: Créer un produit (brouillon)
      description: |
        Étape 1 du flux produit. Le statut est toujours `draft`.
        Enchaîner avec : images → vidéo (optionnel) → variantes → publication.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, price, category_id]
              properties:
                name:
                  type: string
                short_description:
                  type: string
                  description: Description courte (max 500 caractères)
                description:
                  type: string
                  description: Description longue (fiche produit)
                price:
                  type: number
                category_id:
                  type: integer
                sub_category_id:
                  type: integer
                is_featured:
                  type: boolean
      responses:
        '201':
          description: Produit créé en brouillon

  /admin/products/{id}:
    get:
      tags: [Admin - Produits]
      summary: Détail produit
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Product'
    put:
      tags: [Admin - Produits]
      summary: Modifier un produit
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Produit mis à jour
    delete:
      tags: [Admin - Produits]
      summary: Supprimer un produit
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Produit supprimé

  /admin/media-limits:
    get:
      tags: [Admin - Produits]
      summary: Limites upload images et vidéos
      description: |
        À utiliser côté dashboard admin pour configurer les formulaires d'upload.
        Défaut : 10 images max (5 Mo chacune, WebP 1200px), 1 vidéo max (30 Mo).
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Limites images et vidéos

  /admin/products/{id}/images:
    post:
      tags: [Admin - Produits]
      summary: Uploader des images produit
      description: |
        Max 10 images par produit, 5 Mo chacune. Converties en WebP 1200px.
        Voir `GET /admin/media-limits` pour les valeurs courantes.

        **Image principale automatique** : si le produit n'a encore aucune image, la 1ʳᵉ image
        de ce lot reçoit `is_primary: true`. Sinon, les nouvelles images arrivent avec `is_primary: false`
        — utiliser `PUT …/images/{imageId}/primary` pour changer la couverture.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '201':
          description: Images uploadées
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Images uploadées
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductMedia'
              example:
                success: true
                message: Images uploadées
                data:
                  - id: 12
                    type: image
                    path: products/1/a1b2c3d4-e5f6-7890-abcd-ef1234567890.webp
                    url: https://api-dev.hakavod97.com/storage/products/1/a1b2c3d4-e5f6-7890-abcd-ef1234567890.webp
                    sort_order: 0
                    is_primary: true
                  - id: 13
                    type: image
                    path: products/1/b2c3d4e5-f6a7-8901-bcde-f12345678901.webp
                    url: https://api-dev.hakavod97.com/storage/products/1/b2c3d4e5-f6a7-8901-bcde-f12345678901.webp
                    sort_order: 1
                    is_primary: false

  /admin/products/{id}/images/reorder:
    put:
      tags: [Admin - Produits]
      summary: Réordonner les images produit
      description: |
        Envoyer la liste complète des IDs d'images dans l'ordre souhaité.
        Ne modifie pas l'image principale (`is_primary`).
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image_ids]
              properties:
                image_ids:
                  type: array
                  items:
                    type: integer
                  example: [12, 15, 14]
      responses:
        '200':
          description: Ordre des images mis à jour

  /admin/products/{id}/images/{imageId}:
    delete:
      tags: [Admin - Produits]
      summary: Supprimer une image
      description: |
        Si l'image supprimée était principale, la première image restante devient principale.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: imageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Image supprimée

  /admin/products/{id}/images/{imageId}/primary:
    put:
      tags: [Admin - Produits]
      summary: Définir l'image principale
      description: |
        Marque l'image indiquée comme couverture (`is_primary: true`) et remet toutes les autres à `false`.
        Corps de requête vide. Ne modifie pas `sort_order`.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: imageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Image principale mise à jour
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Image principale mise à jour
                  data:
                    $ref: '#/components/schemas/ProductMedia'
              example:
                success: true
                message: Image principale mise à jour
                data:
                  id: 15
                  type: image
                  path: products/1/c3d4e5f6-a7b8-9012-cdef-123456789012.webp
                  url: https://api-dev.hakavod97.com/storage/products/1/c3d4e5f6-a7b8-9012-cdef-123456789012.webp
                  sort_order: 2
                  is_primary: true

  /admin/products/{id}/video:
    post:
      tags: [Admin - Produits]
      summary: Uploader une vidéo produit
      description: |
        Vidéo optionnelle (1 par produit). Remplace la vidéo existante si présente.
        Formats : MP4, WebM, MOV. Taille max configurable (défaut 30 Mo).
        Voir `GET /admin/media-limits`.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [video]
              properties:
                video:
                  type: string
                  format: binary
      responses:
        '201':
          description: Vidéo uploadée
    delete:
      tags: [Admin - Produits]
      summary: Supprimer la vidéo produit
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Vidéo supprimée

  /admin/products/{id}/publish:
    post:
      tags: [Admin - Produits]
      summary: Publier un produit
      description: |
        Étape 4 du flux. Requiert au moins une image et une variante (couleur + taille).
        Si le stock total est 0 et `mode=available`, le statut devient `out_of_stock`.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: [available, preorder]
                  default: available
                preorder_available_date:
                  type: string
                  format: date
                  description: Requis si mode=preorder
      responses:
        '200':
          description: Produit publié
        '422':
          description: Produit incomplet (images ou variantes manquantes)

  /admin/products/{id}/unpublish:
    post:
      tags: [Admin - Produits]
      summary: Remettre un produit en brouillon
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
