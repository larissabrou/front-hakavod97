  /store/checkout/preview:
    post:
      tags: [Store - Boutique]
      summary: Récapitulatif checkout (devise choisie)
      description: |
        À appeler sur la page panier/checkout **avant** validation.
        Affiche sous-total et total dans la devise choisie.
        **La livraison est incluse dans les prix des articles** (`shipping_cost` vaut toujours 0).
        Les montants XOF restent la référence pour le paiement réel.

        **Mode panier serveur** : passer `use_cart: true` pour calculer le récap depuis le panier
        (`GET /store/cart`) — pas besoin d'envoyer `items[]`. Auth identique au panier :
        Bearer client ou `X-Guest-Token` invité.

        **Mode manuel** : omettre `use_cart` et envoyer `items[]` (utile si panier 100 % côté front).
      security: []
      parameters:
        - $ref: '#/components/parameters/LangQuery'
        - name: X-Guest-Token
          in: header
          required: false
          schema:
            type: string
            format: uuid
          description: "Panier invité (si use_cart est true, sans Bearer)"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                use_cart:
                  type: boolean
                  description: |
                    Si `true`, lit les articles du panier serveur. `items` devient inutile.
                    Erreur 422 si le panier est vide.
                items:
                  type: array
                  minItems: 1
                  description: Requis si `use_cart` est absent ou `false`
                  items:
                    type: object
                    required: [product_id, product_variant_id, quantity]
                    properties:
                      product_id:
                        type: integer
                      product_variant_id:
                        type: integer
                      quantity:
                        type: integer
                currency:
                  type: string
                  enum: [XOF, USD, EUR]
                  default: XOF
            examples:
              depuis_panier:
                summary: Depuis le panier serveur (recommandé)
                value:
                  use_cart: true
                  currency: EUR
              manuel:
                summary: Articles envoyés manuellement
                value:
                  items:
                    - product_id: 10
                      product_variant_id: 55
                      quantity: 1
                  currency: XOF
      responses:
        '200':
          description: Récap avec total_display dans la devise demandée
        '422':
          description: Panier vide (`use_cart`) ou articles invalides

  /store/orders:
    get:
      tags: [Store - Client]
      summary: Historique des commandes (client connecté)
      description: |
        Liste paginée des commandes du client authentifié.
        Pour le suivi invité par référence, utiliser `GET /store/orders/{reference}` (public).
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CurrencyQuery'
        - $ref: '#/components/parameters/LangQuery'
        - name: per_page
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Commandes paginées avec montants formatés
        '401':
          description: Non connecté
    post:
      tags: [Store - Boutique]
      summary: Passer une commande
      description: |
        Enregistre la commande en **XOF** depuis le **panier serveur**.
        **La livraison est incluse dans les prix** — ne pas envoyer de frais de livraison séparés.
        Passer `currency` pour la réponse d'affichage dans la devise choisie.

        **Invité** : `customer_name`, `customer_email`, `customer_phone` requis + header `X-Guest-Token`.
        **Client connecté** : Bearer — coordonnées préremplies depuis le profil si omises.
      security: []
      parameters:
        - name: X-Guest-Token
          in: header
          schema:
            type: string
            format: uuid
          description: Panier invité (sans Bearer)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_name, customer_email, customer_phone, shipping_address, commune_id]
              properties:
                customer_name:
                  type: string
                customer_email:
                  type: string
                customer_phone:
                  type: string
                shipping_address:
                  type: string
                commune_id:
                  type: integer
                notes:
                  type: string
                currency:
                  type: string
                  enum: [XOF, USD, EUR]
                  description: Devise d'affichage de la confirmation
                lang:
                  type: string
                  enum: [fr, en]
      responses:
        '201':
          description: Commande créée avec total_display
        '422':
          description: Panier vide ou articles invalides

  /store/orders/{reference}:
    get:
      tags: [Store - Boutique]
      summary: Suivi commande par référence
      parameters:
        - $ref: '#/components/parameters/CurrencyQuery'
        - $ref: '#/components/parameters/LangQuery'
        - name: reference
          in: path
          required: true
          schema:
            type: string
            example: CMD-AB12CD34
      responses:
        '200':
          description: Statut commande (logistique). Pour le paiement, utiliser `/store/orders/{reference}/payments/status`.

  /store/orders/{reference}/payments:
    post:
      tags: [Store - Boutique]
      summary: Initier un paiement
      description: |
        Lance un paiement **mobile money** (Orange, Moov, MTN, Wave) ou **Visa** (bientôt — renvoie 422).

        - Enregistre un paiement en base avec `status: PENDING`.
        - Appelle le gateway AggregPay ; la réponse peut inclure `gateway_status` et `provider_link` (Wave).
        - **Ne confirme pas** la commande : seul le webhook `POST /webhooks/aggregpay` passe la commande en `confirmed`.

        **Mode test** (`PAYMENT_GATEWAY_TEST_MODE=true`) : débite `PAYMENT_GATEWAY_TEST_AMOUNT` XOF (défaut 200) au lieu du total commande.
      security: []
      parameters:
        - name: reference
          in: path
          required: true
          schema:
            type: string
            example: CMD-AB12CD34
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_type]
              properties:
                payment_type:
                  type: string
                  enum: [mobile_money, visa]
                operator:
                  type: string
                  enum: [orange, moov, mtn, wave]
                  description: Requis si `payment_type=mobile_money`
                phone_number:
                  type: string
                  description: Requis si `payment_type=mobile_money`
                country:
                  type: string
                  example: CI
                success_url:
                  type: string
                  format: uri
                  description: Requis pour Wave et Visa (redirect)
                cancel_url:
                  type: string
                  format: uri
                  description: Requis pour Wave et Visa (redirect)
            examples:
              orange:
                summary: Mobile money — Orange
                value:
                  payment_type: mobile_money
                  operator: orange
                  phone_number: "0758942495"
                  country: CI
              wave:
                summary: Mobile money — Wave (redirect)
                value:
                  payment_type: mobile_money
                  operator: wave
                  phone_number: "0758942495"
                  success_url: https://boutique.example.com/paiement/succes
                  cancel_url: https://boutique.example.com/paiement/annule
      responses:
        '201':
          description: Paiement initié
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Payment'
        '422':
          description: Commande non payable, Visa indisponible ou erreur gateway

  /store/orders/{reference}/payments/status:
    get:
      tags: [Store - Boutique]
      summary: Statut paiement (polling front)
      description: |
        **Lecture seule pour le front** — n'écrit **pas** en base.

        Interroge le gateway si le paiement n'est pas final en base, et renvoie :
        - `status` : statut persisté (mis à jour par le webhook)
        - `gateway_status` : statut live opérateur (UX « en attente de validation »)

        Poller toutes les 3–5 s jusqu'à `status=SUCCESS` ou `FAILED`.
      security: []
      parameters:
        - name: reference
          in: path
          required: true
          schema:
            type: string
            example: CMD-AB12CD34
      responses:
        '200':
          description: Statut paiement
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Payment'
        '404':
          description: Commande ou paiement introuvable
        '502':
          description: Gateway indisponible

  /webhooks/aggregpay:
    post:
      tags: [Webhooks]
      summary: Webhook AggregPay (paiement confirmé / échoué)
      description: |
        Appelé par **payment.czotick.com** après validation du paiement mobile money.

        **Seul mécanisme** qui met à jour la base :
        - `SUCCESS` → paiement `success`, commande `confirmed` (ou `preorder_confirmed`)
        - `FAILED` / `CANCELLED` → paiement `failed`, commande `cancelled`, restitution du stock

        Header requis si configuré : `X-Gateway-Signature` (HMAC SHA256 du body avec `PAYMENT_GATEWAY_WEBHOOK_SECRET`).

        URL à enregistrer côté gateway : `https://votre-api.com/api/webhooks/aggregpay`
      security: []
      parameters:
        - name: X-Gateway-Signature
          in: header
          required: false
          schema:
            type: string
          description: HMAC SHA256 du corps JSON brut
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id, status]
              properties:
                order_id:
                  type: string
                  description: Référence gateway (`PAY-…`)
                  example: PAY-AB12CD34EF
                event:
                  type: string
                  example: payment.succeeded
                status:
                  type: string
                  enum: [PENDING, SUCCESS, FAILED, CANCELLED]
                amount:
                  type: integer
                message:
                  type: string
                metadata:
                  type: object
                  properties:
                    order_reference:
                      type: string
                    order_id:
                      type: integer
            example:
              order_id: PAY-AB12CD34EF
              event: payment.succeeded
              status: SUCCESS
              amount: 200
      responses:
        '200':
          description: Webhook reçu
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true
        '401':
          description: Signature HMAC invalide
        '400':
          description: Corps JSON invalide

  /store/countries:
    get:
      tags: [Store - Client]
      summary: Pays supportés et méthodes d'inscription
      responses:
        '200':
          description: Liste des pays avec auth_methods (phone, email, google, facebook)

  /store/shipping-zones:
    get:
      tags: [Store - Boutique]
      summary: Zones de livraison actives (public)
      description: |
        Liste des zones configurées en admin. **Non utilisé au checkout** :
        les frais de livraison sont inclus dans le prix des articles.
      parameters:
        - name: commune_id
          in: query
          schema:
            type: integer
        - name: region_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Zones de livraison

  /store/auth/register/phone:
    post:
      tags: [Store - Client]
      summary: Inscription par téléphone — étape 1 (OTP SMS)
      description: |
        Envoie un code SMS pour **vérifier le numéro** lors de la création du compte.
        Étape 2 : `POST /store/auth/otp/verify` avec le code + mot de passe.
        La connexion ultérieure se fait via `POST /store/auth/login/phone` (sans SMS).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [country, phone, name]
              properties:
                country:
                  type: string
                  example: CI
                phone:
                  type: string
                  example: "+2250700000000"
                name:
                  type: string
      responses:
        '200':
          description: OTP envoyé

  /store/auth/login/phone:
    post:
      tags: [Store - Client]
      summary: Connexion par téléphone et mot de passe
      description: |
        Connexion directe **sans SMS** — le OTP n'est utilisé qu'à l'inscription.
        Comptes créés avant cette évolution sans mot de passe doivent en définir un
        via le support ou une réinitialisation (à prévoir côté produit).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [country, phone, password]
              properties:
                country:
                  type: string
                  example: CI
                phone:
                  type: string
                  example: "+2250700000000"
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Token Sanctum client
        '422':
          description: Identifiants invalides

  /store/auth/otp/verify:
    post:
      tags: [Store - Client]
      summary: Inscription par téléphone — étape 2 (OTP + mot de passe)
      description: |
        Valide le code SMS et crée le compte avec un mot de passe.
        Réservé à l'**inscription** — si le numéro existe déjà, utiliser `login/phone`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [country, phone, code, password, password_confirmation]
              properties:
                country:
                  type: string
                phone:
                  type: string
                code:
                  type: string
                  example: "123456"
                password:
                  type: string
                  minLength: 8
                password_confirmation:
                  type: string
      responses:
        '201':
          description: Compte créé avec token
        '422':
          description: Code invalide ou numéro déjà inscrit

  /store/auth/otp/resend:
    post:
      tags: [Store - Client]
      summary: Renvoyer le code OTP SMS (inscription uniquement)
      description: |
        Uniquement pendant l'**inscription** (numéro pas encore enregistré).
        Cooldown 60 s entre envois. En dev, le code est dans `storage/logs/laravel.log`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [country, phone]
              properties:
                country:
                  type: string
                  example: CI
                phone:
                  type: string
                  example: "+2250700000000"
                name:
                  type: string
                  description: Optionnel — utilisé si création de compte en cours
      responses:
        '200':
          description: OTP renvoyé
        '429':
          description: Cooldown actif (`retry_after` en secondes)

  /store/auth/register:
    post:
      tags: [Store - Client]
      summary: Inscription par e-mail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [country, name, email, password, password_confirmation]
              properties:
                country:
                  type: string
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                password_confirmation:
                  type: string
      responses:
        '201':
          description: Compte créé avec token

  /store/auth/login:
    post:
      tags: [Store - Client]
      summary: Connexion par e-mail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Token Sanctum client

  /store/auth/forgot-password:
    post:
      tags: [Store - Client]
      summary: Mot de passe oublié (e-mail)
      description: |
        Envoie un lien de réinitialisation si un compte **client** existe avec cet e-mail.
        Réponse identique que le compte existe ou non (sécurité).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: E-mail envoyé si compte éligible

  /store/auth/reset-password:
    post:
      tags: [Store - Client]
      summary: Réinitialiser le mot de passe
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, token, password, password_confirmation]
              properties:
                email:
                  type: string
                  format: email
                token:
                  type: string
                  description: Token reçu par e-mail
                password:
                  type: string
                  minLength: 8
                password_confirmation:
                  type: string
      responses:
        '200':
          description: Mot de passe réinitialisé
        '422':
          description: Token invalide ou expiré

  /store/auth/social/google:
    post:
      tags: [Store - Client]
      summary: Connexion / inscription Google
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [country, access_token]
              properties:
                country:
                  type: string
                access_token:
                  type: string
      responses:
        '200':
          description: Token Sanctum client

  /store/auth/social/facebook:
    post:
      tags: [Store - Client]
      summary: Connexion / inscription Facebook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [country, access_token]
              properties:
                country:
                  type: string
                access_token:
                  type: string
      responses:
        '200':
          description: Token Sanctum client

  /store/auth/me:
    get:
      tags: [Store - Client]
      summary: Profil client connecté
      description: |
        Retourne le profil du client authentifié avec compteurs (`orders_count`, `favorites_count`)
        et comptes sociaux liés (`social_accounts`).
        Pour modifier le profil : `PUT /store/profile`.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil avec compteurs commandes et favoris
          content:
            application/json:
              example:
                success: true
                message: OK
                data:
                  id: 3
                  name: Marie Kouassi
                  email: marie@example.com
                  phone: "+2250700000000"
                  country: CI
                  auth_provider: email
                  phone_verified_at: null
                  email_verified_at: "2026-06-15T10:00:00.000000Z"
                  orders_count: 2
                  favorites_count: 5
                  social_accounts: []
        '401':
          description: Non connecté
        '403':
          description: Token invalide ou compte non client

  /store/auth/logout:
    post:
      tags: [Store - Client]
      summary: Déconnexion
      description: Révoque le token Bearer courant. Corps vide.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Déconnexion réussie

  /store/auth/password:
    put:
      tags: [Store - Client]
      summary: Changer le mot de passe
      description: Réservé aux comptes avec mot de passe (e-mail ou téléphone). Pas pour connexion social seule.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, password, password_confirmation]
              properties:
                current_password:
                  type: string
                password:
                  type: string
                  minLength: 8
                password_confirmation:
                  type: string
      responses:
        '200':
          description: Mot de passe mis à jour
        '422':
          description: Mot de passe actuel incorrect ou compte sans mot de passe

  /store/auth/account:
    delete:
      tags: [Store - Client]
      summary: Désactiver le compte client
      description: "Révoque tous les tokens et désactive le compte (is_active false). Corps vide."
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Compte désactivé

  /store/profile:
    put:
      tags: [Store - Client]
      summary: Mettre à jour le profil
      description: |
        Au moins un contact (e-mail ou téléphone) doit rester renseigné après modification.
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                  nullable: true
                phone:
                  type: string
                  nullable: true
                country:
                  type: string
                  description: Code ISO 2 lettres (ex. CI)
                  example: CI
      responses:
        '200':
          description: Profil mis à jour

  /store/cart:
    get:
      tags: [Store - Client]
      summary: Contenu du panier (guest ou connecté)
      description: |
        **Invité** : pas de Bearer. Conserver `guest_token` de la réponse (ou l'en-tête `X-Guest-Token`)
        et le renvoyer sur les requêtes suivantes.

        **Client connecté** : envoyer `Authorization: Bearer {token}` (token boutique, pas admin).
        Le panier est lié au `user_id` ; `guest_token` vaut `null` dans la réponse.
        Après connexion, fusionner l'ancien panier invité via `POST /store/cart/merge` + `X-Guest-Token`.
      security: []
      parameters:
        - name: X-Guest-Token
          in: header
          required: false
          schema:
            type: string
            format: uuid
          description: Token panier invité (ignoré si Bearer client valide)
      responses:
        '200':
          description: Panier
    delete:
      tags: [Store - Client]
      summary: Vider le panier
      description: Supprime tous les articles. Même auth que `GET /store/cart`.
      security: []
      parameters:
        - name: X-Guest-Token
          in: header
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Panier vidé

  /store/cart/items:
    post:
      tags: [Store - Client]
      summary: Ajouter au panier
      description: |
        Même logique d'auth que `GET /store/cart` : Bearer client optionnel, ou mode invité avec `X-Guest-Token`.
      security: []
      parameters:
        - name: X-Guest-Token
          in: header
          required: false
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id, product_variant_id, quantity]
              properties:
                product_id:
                  type: integer
                product_variant_id:
                  type: integer
                quantity:
                  type: integer
      responses:
        '201':
          description: Article ajouté

  /store/cart/items/{cartItemId}:
    put:
      tags: [Store - Client]
      summary: Modifier la quantité d'un article
      description: Même auth que `GET /store/cart`.
      security: []
      parameters:
        - name: cartItemId
          in: path
          required: true
          schema:
            type: integer
        - name: X-Guest-Token
          in: header
          required: false
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Panier mis à jour
        '404':
          description: Article introuvable dans ce panier
    delete:
      tags: [Store - Client]
      summary: Retirer un article du panier
      description: Même auth que `GET /store/cart`.
      security: []
      parameters:
        - name: cartItemId
          in: path
          required: true
          schema:
            type: integer
        - name: X-Guest-Token
          in: header
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Article retiré
        '404':
          description: Article introuvable dans ce panier

  /store/cart/merge:
    post:
      tags: [Store - Client]
      summary: Fusionner le panier invité après connexion
      description: |
        À appeler juste après login/inscription avec le `X-Guest-Token` stocké côté front.
        Fusionne les quantités par variante dans le panier du compte connecté.
      security:
        - bearerAuth: []
      parameters:
        - name: X-Guest-Token
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Panier fusionné (ou rien à fusionner si token inconnu)
        '422':
          description: En-tête X-Guest-Token manquant
        '401':
          description: Non connecté

  /store/favorites:
    get:
      tags: [Store - Client]
      summary: Liste des favoris (paginée)
      description: |
        Retourne les favoris du client connecté, avec le **produit** associé (`images`, `category`).
        Granularité **produit** uniquement — pas de variante (couleur/taille) mémorisée.
        Pour cocher les cœurs sur le catalogue, préférer `GET /store/favorites/ids`.
      security:
        - bearerAuth: []
      parameters:
        - name: per_page
          in: query
          schema:
            type: integer
            default: 12
      responses:
        '200':
          description: Favoris paginés
          content:
            application/json:
              example:
                success: true
                message: OK
                data:
                  current_page: 1
                  per_page: 12
                  total: 2
                  data:
                    - id: 5
                      user_id: 3
                      product_id: 10
                      created_at: "2026-06-17T12:00:00.000000Z"
                      updated_at: "2026-06-17T12:00:00.000000Z"
                      product:
                        id: 10
                        name: Tricot
                        slug: tricot-Nf3P
                        price: "3000.00"
                        status: available
                        images:
                          - id: 35
                            type: image
                            url: https://api-dev.hakavod97.com/storage/products/10/19e9d23c-c059-405e-bb71-81433906ff65.webp
                            sort_order: 0
                            is_primary: true
        '401':
          description: Non connecté
        '403':
          description: Token invalide ou compte non client

  /store/favorites/ids:
    get:
      tags: [Store - Client]
      summary: IDs des produits favoris
      description: |
        Liste légère des `product_id` en favori — utile pour marquer les cœurs sur le catalogue
        sans charger toute la fiche produit.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: IDs produits favoris
          content:
            application/json:
              example:
                success: true
                message: OK
                data:
                  product_ids: [10, 14, 22]
        '401':
          description: Non connecté

  /store/favorites/{productId}:
    post:
      tags: [Store - Client]
      summary: Ajouter un produit aux favoris
      description: |
        Ajoute le produit aux favoris du client (`firstOrCreate` — idempotent si déjà en favori).
        Produit requis en statut `available` ou `preorder`.
        Corps de requête vide.
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: Ajouté aux favoris
          content:
            application/json:
              example:
                success: true
                message: Ajouté aux favoris
                data: null
        '404':
          description: Produit introuvable ou non disponible (draft, out_of_stock)
        '401':
          description: Non connecté
    delete:
      tags: [Store - Client]
      summary: Retirer un produit des favoris
      description: |
        Retire le produit des favoris. Silencieux si le produit n'était pas en favori.
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Retiré des favoris
          content:
            application/json:
              example:
                success: true
                message: Retiré des favoris
                data: null
        '401':
          description: Non connecté

  /store/addresses:
    get:
      tags: [Store - Client]
      summary: Adresses de livraison du client
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des adresses (défaut en premier)
    post:
      tags: [Store - Client]
      summary: Ajouter une adresse
      description: La première adresse devient automatiquement par défaut.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_name, customer_phone, shipping_address]
              properties:
                label:
                  type: string
                  maxLength: 100
                  example: Maison
                customer_name:
                  type: string
                customer_phone:
                  type: string
                shipping_address:
                  type: string
                commune_id:
                  type: integer
                  nullable: true
                is_default:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Adresse créée

  /store/addresses/{addressId}:
    put:
      tags: [Store - Client]
      summary: Modifier une adresse
      security:
        - bearerAuth: []
      parameters:
        - name: addressId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                customer_name:
                  type: string
                customer_phone:
                  type: string
                shipping_address:
                  type: string
                commune_id:
                  type: integer
                  nullable: true
                is_default:
                  type: boolean
      responses:
        '200':
          description: Adresse mise à jour
        '404':
          description: Adresse introuvable
    delete:
      tags: [Store - Client]
      summary: Supprimer une adresse
      security:
        - bearerAuth: []
      parameters:
        - name: addressId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Adresse supprimée
        '404':
          description: Adresse introuvable

  /store/addresses/{addressId}/default:
    put:
      tags: [Store - Client]
      summary: Définir l'adresse par défaut
      security:
        - bearerAuth: []
      parameters:
        - name: addressId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Adresse par défaut définie
        '404':
          description: Adresse introuvable
