openapi: 3.0.3
info:
  title: HAKAVOD97 E-commerce API
  description: |
    API REST pour la boutique mode/luxe **HAKAVOD97** (catalogue, commandes, livraison, back-office).

    ---

    ## À qui sert cette API ?

    | Client | Préfixe | Authentification |
    |--------|---------|------------------|
    | **Site vitrine / boutique** (front public) | `/store/*`, `/regions`, `/communes` | Routes publiques + Bearer optionnel (client) |
    | **Dashboard admin** (gestion interne) | `/admin/*` | Bearer token Sanctum (voir ci-dessous) |

    Toutes les routes sont préfixées par `/api` (ex. `GET /api/store/products`).

    ---

    ## Démarrage rapide — intégrer la boutique

    1. **Charger la config** : `GET /store/settings`
       Retourne devises supportées, taux de change, langues et limites médias.
       À appeler au lancement de l'application front.
    2. **Afficher le catalogue** : `GET /store/categories` puis `GET /store/products`
       Les prix sont toujours en **XOF** (franc CFA).
    3. **Convertir les prix côté front** (USD/EUR) avec `exchange_rates` reçus à l'étape 1.
    4. **Panier / checkout** : `POST /store/checkout/preview` avec `use_cart: true` (ou `items[]`) et `currency` pour les totaux formatés (`total_display`). La livraison est incluse dans les prix (`shipping_cost` = 0).
    5. **Commander** : `POST /store/orders` depuis le panier serveur (Bearer ou `X-Guest-Token`) — la commande est enregistrée en XOF.
    6. **Payer** : `POST /store/orders/{reference}/payments` — mobile money (Orange, Moov, MTN, Wave) ou Visa (bientôt). Le montant débité est en XOF.
    7. **Polling front** : `GET /store/orders/{reference}/payments/status` — lit le statut **gateway** (`gateway_status`) sans écrire en base ; le champ `status` reflète la base (mis à jour par le webhook).
    8. **Webhook** (gateway → API) : `POST /webhooks/aggregpay` — **seul** mécanisme qui confirme ou annule la commande en base.
    9. **Suivi commande** : `GET /store/orders/{reference}` — statut logistique (`pending`, `confirmed`, `shipped`…).
    10. **Compte client** : téléphone (OTP SMS à l'inscription puis mot de passe), e-mail + mot de passe, Google ou Facebook — `POST /store/auth/*` → token Bearer.
    11. **Panier serveur** : `GET/POST /store/cart` — invité via `X-Guest-Token` ; client connecté via `Authorization: Bearer` (panier lié au compte, `guest_token` = `null`).
    12. **Favoris** : `POST/DELETE /store/favorites/{productId}` — client connecté uniquement, au niveau **produit** (pas de variante).
    13. **Après connexion** : `POST /store/cart/merge` avec `X-Guest-Token` pour récupérer le panier invité ; `GET /store/orders` pour l'historique.

    ---

    ## Authentification admin (2FA)

    Le login ne renvoie **pas** de token immédiatement. Flux en 2 étapes :

    1. `POST /admin/auth/login` — vérifie email/mot de passe, envoie un code OTP par e-mail
    2. `POST /admin/auth/otp/verify` — valide le code → retourne le **token Bearer**

    Ensuite, envoyer `Authorization: Bearer {token}` sur toutes les routes `/admin/*` (sauf login/OTP).

    ---

    ## Devises — comment ça marche ?

    **Référence unique : le XOF.** Tous les prix sont stockés et facturés en franc CFA.

    | Étape | Comportement |
    |-------|--------------|
    | Catalogue (`GET /store/products`) | Prix en XOF uniquement — pas de paramètre `?currency=` |
    | Affichage USD/EUR | Conversion **côté front** avec les taux de `GET /store/settings` |
    | Checkout & commande | Passer `currency` dans le body (XOF, USD ou EUR) pour recevoir `subtotal_display`, `total_display`, etc. |
    | Paiement réel | Toujours en **XOF**, quelle que soit la devise affichée |

    Les taux proviennent de [Frankfurter](https://www.frankfurter.app/) (parité fixe XOF/EUR), mis en cache et rafraîchis toutes les **6 heures**.

    ---

    ## Langues

    Français (`fr`) et anglais (`en`). Sur les routes boutique :

    - paramètre de requête : `?lang=fr` ou `?lang=en`
    - ou en-tête HTTP : `Accept-Language: fr`

    Les libellés (noms de catégories, messages, etc.) suivent la langue demandée.

    ---

    ## Médias produit (images & vidéo)

    Chaque produit expose ses photos via le tableau `images` et sa vidéo via le champ `video` (optionnel, 1 max).
    **Toujours utiliser `url` pour afficher un média** — `path` est un chemin interne de stockage.

    | Champ | Rôle |
    |-------|------|
    | `sort_order` | Ordre d'affichage dans la galerie (0 = première) |
    | `is_primary` | Image de couverture (cartes produit, vignettes, partage) |

    ### Front vitrine (boutique)

    - **Liste / cartes** : image où `is_primary === true`.
      Repli si aucune n'est marquée : première entrée de `images` (déjà triée par `sort_order`).
    - **Fiche produit** : galerie = toutes les `images` dans l'ordre `sort_order`.
    - **Vidéo** : champ séparé `video` (absent de `images`).

    ### Dashboard admin

    1. `POST /admin/products/{id}/images` — au **premier** upload du produit, la 1ʳᵉ image du lot reçoit `is_primary: true` automatiquement. Les uploads suivants ont `is_primary: false`.
    2. `PUT /admin/products/{id}/images/{imageId}/primary` — changer l'image de couverture.
    3. `PUT /admin/products/{id}/images/reorder` — réordonne la galerie (`sort_order`) **sans** modifier `is_primary`.
    4. `DELETE /admin/products/{id}/images/{imageId}` — si l'image principale est supprimée, la première restante (par `sort_order`) devient principale.

    ---

    ## Format des réponses

    ```json
    { "success": true, "message": "...", "data": { ... } }
    ```

    En cas d'erreur de validation : `success: false` et objet `errors` par champ.
  version: 1.0.0
  contact:
    name: HAKAVOD97
    email: larissabrou6@gmail.com

servers:
  - url: https://api-dev.hakavod97.com/api
    description: Développement
  - url: https://api.hakavod97.com/api
    description: Production

tags:
  - name: Admin - Auth
    description: Connexion 2FA (OTP), profil et mot de passe — point d'entrée du dashboard
  - name: Admin - Catégories
    description: Gestion des catégories et sous-catégories produits
  - name: Admin - Produits
    description: CRUD produits, images, vidéos, variantes (couleur/taille), publication
  - name: Admin - Couleurs & Tailles
    description: Référentiels couleurs et tailles pour les variantes
  - name: Admin - Commandes
    description: Liste, détail et mise à jour du statut des commandes clients
  - name: Admin - Livraison
    description: Zones et tarifs de livraison
  - name: Admin - Utilisateurs
    description: Comptes admin et rôles (super_admin uniquement)
  - name: Admin - Dashboard
    description: Statistiques, graphiques et alertes stock
  - name: Admin - Notifications
    description: Templates e-mail promotionnels, campagnes programmées ou envoi immédiat aux clients
  - name: Public - Géographie
    description: Régions et communes de Côte d'Ivoire (formulaire livraison)
  - name: Store - Boutique
    description: Catalogue public, checkout et commandes — sans authentification
  - name: Store - Client
    description: Inscription, connexion (téléphone, e-mail, Google, Facebook), panier, favoris, adresses et commandes client
  - name: Webhooks
    description: Callbacks serveur-à-serveur (passerelle de paiement AggregPay)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  parameters:
    CurrencyQuery:
      name: currency
      in: query
      description: |
        Devise d'affichage pour les montants formatés (`total_display`, etc.).
        N'affecte pas les prix catalogue (toujours en XOF). Stockage et paiement en XOF.
      schema:
        type: string
        enum: [XOF, USD, EUR]
        default: XOF
    LangQuery:
      name: lang
      in: query
      description: Langue d'affichage (ou en-tête Accept-Language)
      schema:
        type: string
        enum: [fr, en]
        default: fr

  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          nullable: true

    ValidationError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: object

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        role:
          type: string
          enum: [super_admin, admin, gestionnaire_stock, service_client]

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            token:
              type: string
            user:
              $ref: '#/components/schemas/User'

    OtpPendingResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            requires_otp:
              type: boolean
              example: true
            email:
              type: string
              description: E-mail masqué
              example: ad***@boutique.ci
            expires_at:
              type: string
              format: date-time
            expires_in:
              type: integer
              description: Secondes avant expiration
              example: 600

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        is_active:
          type: boolean
        sub_categories:
          type: array
          items:
            $ref: '#/components/schemas/SubCategory'

    SubCategory:
      type: object
      properties:
        id:
          type: integer
        category_id:
          type: integer
        name:
          type: string
        slug:
          type: string
        is_active:
          type: boolean

    Color:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        hex_code:
          type: string
          example: "#FF5733"

    Size:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sort_order:
          type: integer

    NotificationTemplate:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [promotion, newsletter, custom]
        subject:
          type: string
        body_html:
          type: string
          description: HTML avec variables {{customer_name}}, {{promotion_title}}, etc.
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    NotificationCampaign:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        notification_template_id:
          type: integer
          nullable: true
        subject:
          type: string
          nullable: true
        body_html:
          type: string
          nullable: true
        audience_type:
          type: string
          enum: [all_clients, custom_list]
        custom_emails:
          type: array
          items:
            type: string
            format: email
          nullable: true
        variables:
          type: object
          nullable: true
          properties:
            promotion_title:
              type: string
            promotion_description:
              type: string
            promotion_code:
              type: string
            cta_url:
              type: string
              format: uri
        scheduled_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [draft, scheduled, processing, sent, failed, cancelled]
        sent_at:
          type: string
          format: date-time
          nullable: true
        total_recipients:
          type: integer
        sent_count:
          type: integer
        failed_count:
          type: integer

    ProductVariant:
      type: object
      properties:
        id:
          type: integer
        color_id:
          type: integer
        size_id:
          type: integer
        stock:
          type: integer
        price:
          type: number
          nullable: true
        sku:
          type: string
          nullable: true
        color:
          $ref: '#/components/schemas/Color'
        size:
          $ref: '#/components/schemas/Size'

    PriceDisplay:
      type: object
      description: Prix pour affichage boutique (indicatif si devise ≠ XOF)
      properties:
        amount:
          type: number
        currency:
          type: string
          enum: [XOF, USD, EUR]
        symbol:
          type: string
          example: "F CFA"
        label:
          type: string
          example: Franc CFA
        formatted:
          type: string
          example: "env. $72,00"
        indicative:
          type: boolean
          description: true si conversion USD/EUR (prix non contractuel)
        charged_in:
          type: string
          enum: [XOF]
          description: Devise réelle au paiement

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        short_description:
          type: string
          nullable: true
          description: Description courte (liste produits, cartes, aperçu)
          maxLength: 500
        description:
          type: string
          nullable: true
          description: Description longue (fiche produit complète)
        price:
          type: number
          description: Montant en XOF — conversion affichage gérée par le front
        category_id:
          type: integer
        sub_category_id:
          type: integer
          nullable: true
        status:
          type: string
          enum: [draft, available, preorder, out_of_stock]
          description: |
            `draft` = brouillon (création en cours).
            Publication via `POST /admin/products/{id}/publish` après images + variantes.
        preorder_available_date:
          type: string
          format: date
          nullable: true
        is_featured:
          type: boolean
        variants:
          type: array
          items:
            $ref: '#/components/schemas/ProductVariant'
        images:
          type: array
          description: |
            Photos du produit, triées par `sort_order` croissant.
            Vignette catalogue : l'entrée avec `is_primary: true` (voir section « Médias produit »).
          items:
            $ref: '#/components/schemas/ProductMedia'
        video:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ProductMedia'
          description: Vidéo produit optionnelle (1 max), hors tableau `images`

    ProductMedia:
      type: object
      description: Média produit (image ou vidéo). Utiliser `url` pour l'affichage front.
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [image, video]
          description: "`image` pour les photos ; `video` pour la vidéo produit."
        path:
          type: string
          description: Chemin interne de stockage — ne pas utiliser dans `<img src>` ou `<video src>`.
        url:
          type: string
          description: URL publique absolue prête à l'emploi (ex. `https://api…/storage/products/1/….webp`).
          example: https://api-dev.hakavod97.com/storage/products/1/a1b2c3d4-e5f6-7890-abcd-ef1234567890.webp
        sort_order:
          type: integer
          description: Position dans la galerie (0 = première). Indépendant de `is_primary`.
          example: 0
        is_primary:
          type: boolean
          description: |
            `true` = image de couverture (cartes catalogue, vignettes). Une seule image principale par produit.
            Toujours `false` pour les vidéos.
          example: true

    Order:
      type: object
      properties:
        id:
          type: integer
        reference:
          type: string
        status:
          type: string
          enum: [pending, confirmed, preparing, shipped, delivered, cancelled, preorder_pending, preorder_confirmed]
        is_preorder:
          type: boolean
        customer_name:
          type: string
        customer_email:
          type: string
        customer_phone:
          type: string
        subtotal:
          type: number
        shipping_cost:
          type: number
          description: Toujours 0 — la livraison est incluse dans les prix des articles.
        total:
          type: number

    Payment:
      type: object
      description: |
        Paiement mobile money via AggregPay (payment.czotick.com).

        - **`status`** : statut persisté en base (source de vérité métier). Mis à jour **uniquement** par le webhook.
        - **`gateway_status`** : statut live côté opérateur (polling front). Ne modifie pas la base.
      properties:
        gateway_reference:
          type: string
          example: PAY-AB12CD34EF
          description: Référence envoyée au gateway (`order_id` côté AggregPay).
        payment_type:
          type: string
          enum: [mobile_money, visa]
        status:
          type: string
          enum: [PENDING, SUCCESS, FAILED]
          description: Statut en base (webhook).
        gateway_status:
          type: string
          enum: [PENDING, SUCCESS, FAILED, CANCELLED]
          description: Statut live gateway (endpoint status uniquement, non persisté).
        gateway_message:
          type: string
          nullable: true
          description: Message d'erreur gateway le cas échéant.
        amount:
          type: integer
          description: Montant débité en XOF (200 en mode test si `PAYMENT_GATEWAY_TEST_MODE=true`).
        order_total:
          type: integer
          nullable: true
          description: Total réel de la commande (présent en mode test).
        test_mode:
          type: boolean
          nullable: true
        currency:
          type: string
          example: XOF
        operator:
          type: string
          enum: [orange, moov, mtn, wave]
          nullable: true
        phone_number:
          type: string
          nullable: true
        country:
          type: string
          example: CI
        aggregator:
          type: string
          example: aggregpay
          nullable: true
        fee_rate_percent:
          type: number
          nullable: true
        fee_amount:
          type: number
          nullable: true
        net_amount:
          type: number
          nullable: true
        provider_link:
          type: string
          format: uri
          nullable: true
          description: URL de redirection Wave.
        failure_message:
          type: string
          nullable: true
        paid_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    ShippingZone:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
        delivery_days:
          type: integer
        is_active:
          type: boolean

    Region:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string

    Commune:
      type: object
      properties:
        id:
          type: integer
        region_id:
          type: integer
        name:
          type: string
        region:
          $ref: '#/components/schemas/Region'

paths:
  /admin/auth/login:
    post:
      tags: [Admin - Auth]
      summary: Connexion admin — étape 1 (envoi OTP)
      description: |
        Vérifie email/mot de passe et envoie un code OTP par e-mail.
        Le token Sanctum n'est délivré qu'après `POST /admin/auth/otp/verify`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: larissabrou6@gmail.com
                password:
                  type: string
                  example: password
      responses:
        '200':
          description: Code OTP envoyé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpPendingResponse'
        '422':
          description: Identifiants invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '429':
          description: Cooldown renvoi OTP

  /admin/auth/otp/send:
    post:
      tags: [Admin - Auth]
      summary: Renvoyer le code OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: larissabrou6@gmail.com
                password:
                  type: string
                  example: password
      responses:
        '200':
          description: Nouveau code envoyé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpPendingResponse'
        '429':
          description: Cooldown actif (retry_after en secondes)

  /admin/auth/otp/verify:
    post:
      tags: [Admin - Auth]
      summary: Confirmer le code OTP — étape 2
      description: Valide le code à 6 chiffres et retourne le token Sanctum.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  type: string
                  example: larissabrou6@gmail.com
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
                  example: "482913"
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '422':
          description: Code invalide ou expiré

  /admin/auth/logout:
    post:
      tags: [Admin - Auth]
      summary: Déconnexion
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Token révoqué
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /admin/auth/me:
    get:
      tags: [Admin - Auth]
      summary: Profil admin connecté
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Profil utilisateur
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'

  /admin/auth/password:
    put:
      tags: [Admin - Auth]
      summary: Changer le mot de passe
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, password, password_confirmation]
              properties:
                current_password:
                  type: string
                password:
                  type: string
                  minLength: 8
                password_confirmation:
                  type: string
      responses:
        '200':
          description: Mot de passe mis à jour

  /admin/categories:
    get:
      tags: [Admin - Catégories]
      summary: Liste des catégories avec sous-catégories
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
    post:
      tags: [Admin - Catégories]
      summary: Créer une catégorie
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                is_active:
                  type: boolean
      responses:
        '201':
          description: Catégorie créée

  /admin/categories/{id}:
    put:
      tags: [Admin - Catégories]
      summary: Modifier une catégorie
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                is_active:
                  type: boolean
      responses:
        '200':
          description: Catégorie mise à jour
    delete:
      tags: [Admin - Catégories]
      summary: Supprimer une catégorie
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Catégorie supprimée

  /admin/categories/{id}/sub-categories:
    post:
      tags: [Admin - Catégories]
      summary: Ajouter une sous-catégorie
      security: [{ bearerAuth: [] }]
